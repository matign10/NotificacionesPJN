name: PJN Monitor - Verificación Automática

on:
  schedule:
    # Ejecutar cada 25 minutos: el refresh_token de Keycloak tiene TTL de
    # 30 min y rota en cada uso. Si dejamos */30, una demora minima del
    # runner hace que el RT expire entre corridas y se pierda la sesion.
    - cron: '*/25 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub
  push:
    branches: [ main, master ] # Para testing inicial

jobs:
  check-notifications:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'

    - name: Instalar dependencias
      run: npm ci --ignore-scripts

    # Playwright se usa para auto-bootstrap cuando la sesion Keycloak se
    # invalida. La mayoria de las corridas no lo necesitan, pero hay que
    # tener Chromium listo por si toca recuperar.
    - name: Instalar Chromium para Playwright
      run: npx playwright install --with-deps chromium

    - name: Diagnóstico de secrets (sin revelar valores)
      env:
        PJN_USERS: ${{ secrets.PJN_USERS }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        echo "PJN_USERS set:                 ${PJN_USERS:+yes}${PJN_USERS:-NO}"
        echo "TELEGRAM_BOT_TOKEN set:        ${TELEGRAM_BOT_TOKEN:+yes}${TELEGRAM_BOT_TOKEN:-NO}"
        echo "TELEGRAM_CHAT_ID set:          ${TELEGRAM_CHAT_ID:+yes}${TELEGRAM_CHAT_ID:-NO}"
        echo "SUPABASE_URL set:              ${SUPABASE_URL:+yes}${SUPABASE_URL:-NO}"
        echo "SUPABASE_SERVICE_ROLE_KEY set: ${SUPABASE_SERVICE_ROLE_KEY:+yes}${SUPABASE_SERVICE_ROLE_KEY:-NO}"

    - name: Ejecutar verificación
      env:
        PJN_USERS: ${{ secrets.PJN_USERS }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '60' }}
        ATTACH_PDF: ${{ vars.ATTACH_PDF || 'true' }}
        HEADLESS_MODE: 'true'
        NODE_ENV: production
      run: npm run check:now

    - name: Guardar logs en caso de error
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: error-logs
        path: ./logs/
        retention-days: 7
