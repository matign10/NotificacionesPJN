name: PJN Monitor - Verificación Automática

on:
  schedule:
    # Ejecutar cada 25 minutos: el refresh_token de Keycloak tiene TTL de
    # 30 min y rota en cada uso. Si dejamos */30, una demora minima del
    # runner hace que el RT expire entre corridas y se pierda la sesion.
    - cron: '*/25 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub
  push:
    branches: [ main, master ] # Para testing inicial

jobs:
  check-notifications:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Instalar dependencias
      run: npm ci --ignore-scripts

    - name: Ejecutar verificación
      env:
        PJN_CLIENT_ID: ${{ secrets.PJN_CLIENT_ID }}
        PJN_REFRESH_TOKEN: ${{ secrets.PJN_REFRESH_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '60' }}
        ATTACH_PDF: ${{ vars.ATTACH_PDF || 'true' }}
        NODE_ENV: production
      run: npm run check:now
    
    # Ya no necesitamos commits - Supabase persiste automáticamente
    
    - name: Guardar logs en caso de error
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: ./data/logs/
        retention-days: 7